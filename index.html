<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Shrinking Unit of Work</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #fff;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .container {
    width: 1100px;
    height: 700px;
    position: relative;
  }

  .title {
    position: absolute;
    top: 16px;
    left: 80px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #000;
    z-index: 10;
  }

  /* Axis labels BEHIND everything */
  .axis-label-y {
    position: absolute;
    left: -78px;
    top: 50%;
    transform: rotate(-90deg);
    transform-origin: center center;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #000;
    white-space: nowrap;
    z-index: 0;
  }

  .axis-label-x {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #000;
    z-index: 0;
  }

  /* Axes */
  .axis-y {
    position: absolute;
    left: 60px;
    top: 40px;
    bottom: 50px;
    width: 1.5px;
    background: #ddd;
    z-index: 1;
  }
  .axis-y::after {
    content: '';
    position: absolute;
    top: -7px;
    left: -4px;
    border-left: 5px solid transparent;
    border-right: 5px solid transparent;
    border-bottom: 8px solid #ddd;
  }

  .axis-x {
    position: absolute;
    left: 60px;
    bottom: 42px;
    right: 20px;
    height: 1.5px;
    background: #ddd;
    z-index: 1;
  }
  .axis-x::after {
    content: '';
    position: absolute;
    right: -7px;
    top: -4px;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
    border-left: 8px solid #ddd;
  }

  /* Area chart - full bleed */
  .chart-area {
    position: absolute;
    top: 40px;
    left: 60px;
    right: 20px;
    bottom: 42px;
    z-index: 2;
    pointer-events: none;
  }

  .chart-area svg {
    width: 100%;
    height: 100%;
  }

  /* Data points */
  .point-group {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards;
    cursor: default;
    transition: transform 0.3s ease;
    z-index: 5;
  }
  .point-group:hover {
    transform: scale(1.05);
  }
  .point-group:hover .point-ring {
    box-shadow: 0 0 20px var(--glow-color), 0 0 40px var(--glow-color);
    transform: scale(1.15);
  }
  .point-group:hover .point-label {
    color: #000;
  }

  .point-ring {
    width: var(--ring-size);
    height: var(--ring-size);
    border-radius: 50%;
    border: 2.5px solid var(--ring-color);
    background: radial-gradient(circle, var(--bg-inner) 0%, rgba(255,255,255,0.8) 70%);
    box-shadow: 0 0 12px var(--glow-color);
    transition: all 0.4s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .point-inner {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--ring-color);
    box-shadow: 0 0 6px var(--ring-color);
  }

  .point-label {
    margin-top: 12px;
    font-size: 14px;
    font-weight: 600;
    color: #333;
    text-align: center;
    line-height: 1.3;
    transition: color 0.3s ease;
  }

  .point-catalyst {
    margin-top: 5px;
    font-size: 10.5px;
    font-weight: 400;
    color: #aaa;
    text-align: center;
    font-style: italic;
    max-width: 160px;
    line-height: 1.4;
  }

  .p1 { animation-delay: 0.2s; }
  .p2 { animation-delay: 0.45s; }
  .p3 { animation-delay: 0.7s; }
  .p4 { animation-delay: 0.95s; }
  .p5 { animation-delay: 1.2s; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="container">
  <div class="title">The Shrinking Unit of Work</div>

  <!-- Axis labels (behind) -->
  <div class="axis-label-y">Size of Unit of Work</div>
  <div class="axis-label-x">Time</div>

  <!-- Axes -->
  <div class="axis-y"></div>
  <div class="axis-x"></div>

  <!-- Area chart — fills entire plot region -->
  <div class="chart-area">
    <svg viewBox="0 0 1000 600" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="areaGrad" x1="0" y1="0" x2="1000" y2="600" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#6355d8" stop-opacity="0.12"/>
          <stop offset="50%" stop-color="#3db5a6" stop-opacity="0.08"/>
          <stop offset="100%" stop-color="#e8a84c" stop-opacity="0.05"/>
        </linearGradient>
        <linearGradient id="lineGrad" x1="0" y1="0" x2="1000" y2="600" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#6355d8" stop-opacity="0.4"/>
          <stop offset="50%" stop-color="#3db5a6" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="#e8a84c" stop-opacity="0.3"/>
        </linearGradient>
      </defs>
      <!-- Area fill — from top-left corner to bottom-right, touching all edges -->
      <path d="M 0 0 C 120 5, 200 60, 300 150 C 400 240, 520 360, 650 440 C 750 490, 870 545, 1000 600 L 1000 600 L 0 600 Z"
            fill="url(#areaGrad)"/>
      <!-- Curve line -->
      <path d="M 0 0 C 120 5, 200 60, 300 150 C 400 240, 520 360, 650 440 C 750 490, 870 545, 1000 600"
            stroke="url(#lineGrad)" stroke-width="2.5" fill="none" stroke-dasharray="10 7"/>
    </svg>
  </div>

  <!-- Point 1: Joint-Stock Companies -->
  <div class="point-group p1"
       style="left: 115px; top: 60px;
              --ring-size: 78px; --ring-color: #6355d8; --glow-color: rgba(99,85,216,0.12); --bg-inner: rgba(99,85,216,0.1);">
    <div class="point-ring"><div class="point-inner"></div></div>
    <div class="point-label">Joint-Stock<br>Companies</div>
    <div class="point-catalyst">Industrial Revolution</div>
  </div>

  <!-- Point 2: M-Corp -->
  <div class="point-group p2"
       style="left: 290px; top: 170px;
              --ring-size: 64px; --ring-color: #4a8fe7; --glow-color: rgba(74,143,231,0.12); --bg-inner: rgba(74,143,231,0.1);">
    <div class="point-ring"><div class="point-inner"></div></div>
    <div class="point-label">M-Corp</div>
    <div class="point-catalyst">Multinational expansion</div>
  </div>

  <!-- Point 3: SLAs / Consulting -->
  <div class="point-group p3"
       style="left: 470px; top: 280px;
              --ring-size: 52px; --ring-color: #3db5a6; --glow-color: rgba(61,181,166,0.12); --bg-inner: rgba(61,181,166,0.1);">
    <div class="point-ring"><div class="point-inner"></div></div>
    <div class="point-label">SLAs / Consulting</div>
    <div class="point-catalyst">Remote work &amp; outsourcing</div>
  </div>

  <!-- Point 4: Gig + Creator Economy -->
  <div class="point-group p4"
       style="left: 650px; top: 380px;
              --ring-size: 42px; --ring-color: #e8a84c; --glow-color: rgba(232,168,76,0.12); --bg-inner: rgba(232,168,76,0.1);">
    <div class="point-ring"><div class="point-inner"></div></div>
    <div class="point-label">Gig + Creator<br>Economy</div>
    <div class="point-catalyst">Consumer internet &amp; payments</div>
  </div>

  <!-- Point 5: Internet Labor Markets -->
  <div class="point-group p5"
       style="left: 840px; top: 470px;
              --ring-size: 34px; --ring-color: #d45e54; --glow-color: rgba(212,94,84,0.12); --bg-inner: rgba(212,94,84,0.1);">
    <div class="point-ring"><div class="point-inner"></div></div>
    <div class="point-label">Internet Labor<br>Markets</div>
    <div class="point-catalyst">Granular payouts for bespoke tasks</div>
  </div>
</div>

</body>
</html>
